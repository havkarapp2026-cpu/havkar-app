<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAVKAR Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f9d58, #34a853);
      font-family: Arial;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 20px;
      color: #0f9d58;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #0f9d58;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0c7c46;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>HAVKAR</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://iompzwaxuirvatiibrtb.supabase.co",
  "sb_publishable_oEKE1vl6EkWXdETgy9MjHw_DUTJLN4O"
);

async function login() {
  alert("clicked");
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
  email: email,
  password: password
});

  if (error) {
    alert(error.message);
  } else {
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
