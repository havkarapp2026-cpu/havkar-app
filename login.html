<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - HAVKAR</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#eaf5ef;
  text-align:center;
}

.container {
  max-width:400px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  color:#1b5e20;
}

input {
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:16px;
}

button {
  width:100%;
  padding:15px;
  margin-top:15px;
  background:linear-gradient(90deg,#1b8f3a,#2ecc71);
  color:white;
  border:none;
  border-radius:30px;
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <h1>Login</h1>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZ8Ma5QiFPUvkIGCEevHMgNBtREY8z--I",
  authDomain: "havkar-app.firebaseapp.com",
  projectId: "havkar-app",
  storageBucket: "havkar-app.firebasestorage.app",
  messagingSenderId: "832126762661",
  appId: "1:832126762661:web:3251321255fda6e28b174c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("✅ Login success");

    setTimeout(() => {
      window.location.href = "index.html";
    }, 1000);

  } catch (error) {
    alert("❌ " + error.message);
  }
});
</script>

</body>
</html>
