<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR - Global Connection Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1f0a;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* نقشه پس‌زمینه متحرک */
        .world-map {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, #0f2f0f 0%, #1a4d1a 50%, #0f2f0f 100%);
            overflow: hidden;
        }

        .world-map::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(46, 125, 50, 0.3) 2px, transparent 2px),
                radial-gradient(circle at 80% 50%, rgba(67, 160, 71, 0.2) 1px, transparent 1px);
            background-size: 60px 60px, 40px 40px;
            animation: mapMove 30s linear infinite;
        }

        @keyframes mapMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }

        /* ذرات شناور */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(67, 160, 71, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 10px rgba(67, 160, 71, 0.8);
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 80%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 60%; top: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 80%; top: 70%; animation-delay: 6s; }
        .particle:nth-child(5) { left: 40%; top: 50%; animation-delay: 8s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* کانتینر شیشه‌ای */
        .glass-container {
            position: relative;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 45px 30px 35px;
            border: 2px solid rgba(255, 255, 255, 0.18);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        /* هدر با لوگو */
        .header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .logo-glow {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .logo-glow::before {
            content: '';
            position: absolute;
            width: 120px;
            height: 120px;
            top: -10px;
            left: -10px;
            background: radial-gradient(circle, rgba(67, 160, 71, 0.4), transparent);
            border-radius: 50%;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .logo-glow img {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 20px rgba(67, 160, 71, 0.6));
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #66bb6a, #43a047, #2e7d32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(67, 160, 71, 0.5);
        }

        .tagline {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 3px;
        }

        /* منوی سه‌بعدی */
        .menu-3d {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 35px;
            perspective: 1000px;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            position: relative;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(67, 160, 71, 0.2), transparent);
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-10px) rotateX(10deg);
            box-shadow: 
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 0 20px rgba(67, 160, 71, 0.4);
        }

        .menu-card:hover::before {
            opacity: 1;
        }

        .menu-card i {
            font-size: 2.2rem;
            margin-bottom: 10px;
            display: block;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .icon-buy { color: #66bb6a; }
        .icon-jobs { color: #42a5f5; }
        .icon-services { color: #ffa726; }
        .icon-wallet { color: #66bb6a; }
        .icon-chat { color: #26a69a; }
        .icon-support { color: #ab47bc; }

        .menu-card span {
            display: block;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* دکمه ورود نئونی */
        .neon-button {
            width: 100%;
            background: transparent;
            border: 2px solid #43a047;
            color: #66bb6a;
            border-radius: 50px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: 
                0 0 20px rgba(67, 160, 71, 0.3),
                inset 0 0 20px rgba(67, 160, 71, 0.1);
        }

        .neon-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(67, 160, 71, 0.4), transparent);
            transition: left 0.5s ease;
        }

        .neon-button:hover {
            background: rgba(67, 160, 71, 0.2);
            box-shadow: 
                0 0 40px rgba(67, 160, 71, 0.6),
                inset 0 0 20px rgba(67, 160, 71, 0.2);
            transform: translateY(-2px);
        }

        .neon-button:hover::before {
            left: 100%;
        }

        .neon-button::after {
            content: '→';
            margin-left: 10px;
            font-size: 1.4rem;
        }

        /* فوتر */
        .footer {
            text-align: center;
        }

        .create-link {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            margin-bottom: 15px;
        }

        .create-link:hover {
            color: #66bb6a;
            text-shadow: 0 0 10px rgba(102, 187, 106, 0.5);
        }

        .security {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .security::before {
            content: '✓';
            color: #66bb6a;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(102, 187, 106, 0.8);
        }

        .security::after {
            content: '🔒';
        }

        /* برگ تزئینی */
        .glass-leaf {
            position: absolute;
            bottom: 70px;
            right: 20px;
            width: 60px;
            height: 90px;
            opacity: 0.3;
            filter: drop-shadow(0 0 15px rgba(67, 160, 71, 0.6));
            animation: leafSway 5s ease-in-out infinite;
        }

        @keyframes leafSway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }
    </style>
</head>
<body>
    <div class="world-map">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="glass-container">
        <div class="header">
            <div class="logo-glow">
                <img src="icon.png" alt="HAVKAR">
            </div>
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-3d">
            <div class="menu-card">
                <i class="fas fa-shopping-bag icon-buy"></i>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-briefcase icon-jobs"></i>
                <span>Jobs</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-tools icon-services"></i>
                <span>Services</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-wallet icon-wallet"></i>
                <span>Wallet</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-comments icon-chat"></i>
                <span>Chat</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-headset icon-support"></i>
                <span>Support</span>
            </div>
        </div>

        <button class="neon-button">ENTER HAVKAR</button>

        <div class="footer">
            <div class="create-link">Create New Account</div>
            <div class="security">Safe • Secure</div>
        </div>

        <svg class="glass-leaf" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="30" cy="25" rx="18" ry="23" fill="#43a047" opacity="0.6" transform="rotate(-15 30 25)"/>
            <ellipse cx="32" cy="50" rx="20" ry="25" fill="#66bb6a" opacity="0.5" transform="rotate(10 32 50)"/>
            <ellipse cx="34" cy="75" rx="18" ry="23" fill="#43a047" opacity="0.6" transform="rotate(-10 34 75)"/>
        </svg>
    </div>
</body>
    </html>
