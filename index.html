<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f0e8 0%, #d8e8d8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone-frame {
            width: 100%;
            max-width: 390px;
            background: linear-gradient(145deg, #f5f9f5, #e8f0e8);
            border-radius: 50px;
            padding: 60px 25px 30px;
            box-shadow: 
                0 35px 100px rgba(0,0,0,0.12),
                inset 0 0 0 1px rgba(200, 220, 200, 0.5);
            border: 8px solid #d8e8d8;
            position: relative;
        }

        .phone-frame::before {
            content: '';
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 5px;
            background: #b8c8b8;
            border-radius: 3px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%234caf50"/><stop offset="100%" style="stop-color:%231976d2"/></linearGradient></defs><circle cx="50" cy="50" r="45" fill="url(%23g1)"/><ellipse cx="50" cy="50" rx="45" ry="45" fill="none" stroke="%23fff" stroke-width="3" opacity="0.3"/><path d="M 20,40 Q 30,35 40,40 Q 50,45 60,40 Q 70,35 80,40" fill="%231565c0" opacity="0.4"/><path d="M 20,55 Q 30,50 40,55 Q 50,60 60,55 Q 70,50 80,55" fill="%231565c0" opacity="0.4"/><ellipse cx="50" cy="50" rx="48" ry="48" fill="none" stroke="%23ffffff" stroke-width="4" opacity="0.4" transform="rotate(-20 50 50)"/></svg>') center/contain no-repeat;
        }

        h1 {
            font-size: 2.2rem;
            color: #1976d2;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 35px;
        }

        .menu-card {
            background: white;
            border-radius: 25px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: 1px solid rgba(200, 220, 200, 0.3);
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }

        .icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .icon-jobs {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="20" y="35" width="60" height="45" rx="5" fill="%23458b74"/><rect x="30" y="25" width="40" height="15" rx="3" fill="%23376b5e"/><circle cx="50" cy="55" r="8" fill="%23fff"/><rect x="45" y="60" width="10" height="3" fill="%23fff"/></svg>');
        }

        .icon-buy {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M 30,40 L 35,35 L 45,45 L 45,75 L 30,75 Z" fill="%23a4c639"/><path d="M 45,45 L 55,35 L 70,40 L 70,75 L 45,75 Z" fill="%238db82e"/><circle cx="60" cy="30" r="12" fill="%2364b5f6"/><text x="60" y="35" font-size="14" fill="%23fff" text-anchor="middle" font-weight="bold">$</text></svg>');
        }

        .icon-services {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M 35,25 L 45,45 L 30,50 L 35,25 Z" fill="%235e92f3" transform="rotate(-30 37.5 37.5)"/><path d="M 55,45 L 70,30 L 75,45 L 60,50 Z" fill="%234a7fd9" transform="rotate(30 62.5 40)"/></svg>');
        }

        .icon-chat {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><ellipse cx="40" cy="45" rx="25" ry="22" fill="%235e92f3"/><ellipse cx="60" cy="55" rx="25" ry="22" fill="%2326a69a"/><circle cx="35" cy="42" r="3" fill="%23fff"/><circle cx="45" cy="42" r="3" fill="%23fff"/><circle cx="55" cy="52" r="3" fill="%23fff"/><circle cx="65" cy="52" r="3" fill="%23fff"/></svg>');
        }

        .icon-wallet {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="25" y="35" width="50" height="35" rx="4" fill="%23458b74"/><rect x="28" y="30" width="44" height="8" rx="2" fill="%23376b5e"/><circle cx="65" cy="52" r="6" fill="%23ffd54f"/><text x="65" y="57" font-size="10" fill="%23fff" text-anchor="middle" font-weight="bold">$</text><circle cx="40" cy="25" r="8" fill="%2364b5f6"/><text x="40" y="29" font-size="8" fill="%23fff" text-anchor="middle" font-weight="bold">$</text></svg>');
        }

        .icon-support {
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path d="M 30,45 Q 30,30 50,30 Q 70,30 70,45 L 70,50 L 30,50 Z" fill="%235e92f3"/><ellipse cx="30" cy="47" rx="8" ry="12" fill="%234a7fd9"/><ellipse cx="70" cy="47" rx="8" ry="12" fill="%234a7fd9"/><path d="M 40,60 Q 50,68 60,60" stroke="%2326a69a" stroke-width="3" fill="none" stroke-linecap="round"/></svg>');
        }

        .menu-card span {
            display: block;
            color: #5a7a7a;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 35px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-login {
            background: #1976d2;
            color: white;
            box-shadow: 0 8px 20px rgba(25, 118, 210, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(25, 118, 210, 0.4);
        }

        .btn-create {
            background: transparent;
            color: #1976d2;
            border: 2px solid #1976d2;
        }

        .btn-create:hover {
            background: rgba(25, 118, 210, 0.05);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <div class="logo"></div>
            <h1>HAVKAR</h1>
        </div>

        <div class="menu-grid">
            <div class="menu-card">
                <div class="icon icon-jobs"></div>
                <span>Jobs</span>
            </div>
            <div class="menu-card">
                <div class="icon icon-buy"></div>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-card">
                <div class="icon icon-services"></div>
                <span>Services</span>
            </div>
            <div class="menu-card">
                <div class="icon icon-chat"></div>
                <span>Chat</span>
            </div>
            <div class="menu-card">
                <div class="icon icon-wallet"></div>
                <span>Wallet</span>
            </div>
            <div class="menu-card">
                <div class="icon icon-support"></div>
                <span>Support</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-login">Log In</button>
            <button class="btn btn-create">Create Account</button>
        </div>
    </div>
</body>
                </html>
