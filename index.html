<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR - Connect the World</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 50%, #81c784 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(46, 125, 50, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(5deg); }
        }

        .container {
            background: linear-gradient(145deg, rgba(255,255,255,0.98), rgba(250,255,250,0.95));
            border-radius: 50px;
            padding: 70px 40px 45px;
            max-width: 440px;
            width: 100%;
            box-shadow: 
                0 30px 90px rgba(0,0,0,0.15),
                0 0 0 1px rgba(255,255,255,0.8) inset,
                0 5px 15px rgba(46, 125, 50, 0.1);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(120, 170, 120, 0.25) 2px, transparent 2px);
            background-size: 50px 50px;
            opacity: 0.6;
            pointer-events: none;
        }

        .container > * {
            position: relative;
            z-index: 1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .globe-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 35px;
        }

        .globe-image {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 15px 35px rgba(46, 125, 50, 0.4));
            animation: floatGlobe 6s ease-in-out infinite;
        }

        @keyframes floatGlobe {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 4.2rem;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 15px;
            text-shadow: 0 5px 15px rgba(46, 125, 50, 0.1);
        }

        .tagline {
            color: #5a6a5a;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 2px;
            opacity: 0.9;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-item {
            background: linear-gradient(145deg, #ffffff, #f8faf8);
            border-radius: 25px;
            padding: 32px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 8px 25px rgba(0,0,0,0.08),
                0 0 0 1px rgba(46, 125, 50, 0.05) inset;
            position: relative;
            overflow: hidden;
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(46, 125, 50, 0.05), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .menu-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 
                0 15px 40px rgba(0,0,0,0.12),
                0 0 0 1px rgba(46, 125, 50, 0.1) inset;
        }

        .menu-item:hover::before {
            opacity: 1;
        }

        .menu-icon {
            font-size: 2.8rem;
            margin-bottom: 15px;
            display: block;
            transition: transform 0.3s ease;
        }

        .menu-item:hover .menu-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .icon-buy { color: #388e3c; }
        .icon-jobs { color: #1976d2; }
        .icon-services { color: #f57c00; }
        .icon-wallet { color: #43a047; }
        .icon-chat { color: #00897b; }
        .icon-support { color: #5e35b1; }

        .menu-item span {
            display: block;
            color: #2a2a2a;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        .button-section {
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .enter-button {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #388e3c 50%, #43a047 100%);
            color: white;
            border: none;
            border-radius: 60px;
            padding: 24px 30px;
            font-size: 1.45rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 
                0 12px 30px rgba(46, 125, 50, 0.4),
                0 0 0 1px rgba(255,255,255,0.3) inset;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .enter-button:hover::before {
            left: 100%;
        }

        .enter-button:hover {
            transform: translateY(-4px);
            box-shadow: 
                0 18px 45px rgba(46, 125, 50, 0.5),
                0 0 0 1px rgba(255,255,255,0.4) inset;
        }

        .enter-button::after {
            content: '→';
            font-size: 1.8rem;
            transition: transform 0.3s ease;
        }

        .enter-button:hover::after {
            transform: translateX(5px);
        }

        .create-account {
            text-align: center;
            color: #5a6a5a;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .create-account:hover {
            color: #2e7d32;
            transform: translateY(-2px);
        }

        .security-badge {
            text-align: center;
            color: #6a7a6a;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .security-badge::before {
            content: '✓';
            color: #2e7d32;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .security-badge::after {
            content: '🔒';
            font-size: 1.1rem;
        }

        .decorative-plant {
            position: absolute;
            bottom: 95px;
            right: 18px;
            width: 80px;
            height: 120px;
            opacity: 0.8;
            pointer-events: none;
            z-index: 2;
            filter: drop-shadow(0 5px 15px rgba(46, 125, 50, 0.2));
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="globe-wrapper">
                <img src="icon.png" alt="HAVKAR Globe" class="globe-image">
            </div>
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item">
                <i class="fas fa-shopping-bag menu-icon icon-buy"></i>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-briefcase menu-icon icon-jobs"></i>
                <span>Jobs</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-tools menu-icon icon-services"></i>
                <span>Services</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-wallet menu-icon icon-wallet"></i>
                <span>Wallet</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-comments menu-icon icon-chat"></i>
                <span>Chat</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-headset menu-icon icon-support"></i>
                <span>Support</span>
            </div>
        </div>

        <div class="button-section">
            <button class="enter-button">Enter HAVKAR</button>
            <div class="create-account">Create New Account</div>
            <div class="security-badge">Safe • Secure</div>
        </div>
        
        <svg class="decorative-plant" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2e7d32"/>
                    <stop offset="100%" stop-color="#1b5e20"/>
                </linearGradient>
                <linearGradient id="leaf2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#43a047"/>
                    <stop offset="100%" stop-color="#388e3c"/>
                </linearGradient>
                <linearGradient id="leaf3" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4caf50"/>
                    <stop offset="100%" stop-color="#2e7d32"/>
                </linearGradient>
            </defs>
            
            <ellipse cx="40" cy="28" rx="22" ry="28" fill="url(#leaf1)" opacity="0.9" transform="rotate(-15 40 28)"/>
            <ellipse cx="43" cy="60" rx="24" ry="31" fill="url(#leaf2)" opacity="0.88" transform="rotate(12 43 60)"/>
            <ellipse cx="45" cy="95" rx="22" ry="28" fill="url(#leaf3)" opacity="0.9" transform="rotate(-12 45 95)"/>
            
            <path d="M 40,18 Q 40,45 42,78 Q 43,100 45,115" 
                  fill="none" stroke="#1b5e20" stroke-width="2.5" opacity="0.5"/>
        </svg>
    </div>
</body>
      </html>
