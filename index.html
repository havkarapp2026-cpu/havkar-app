<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAVKAR</title>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #e8f5e9, #ffffff);
  text-align:center;
}

h1{
  margin-top:30px;
  color:#1b5e20;
  font-size:28px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:20px;
  padding:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  font-size:16px;
}

.icon{
  font-size:30px;
  margin-bottom:10px;
}

.btn{
  margin:30px 20px;
  padding:20px;
  background: linear-gradient(90deg, #1b8f3a, #2ecc71);
  color:white;
  border-radius:50px;
  font-size:20px;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  }

</style>

</head>


<div class="top">
  <img src="https://cdn-icons-png.flaticon.com/512/921/921347.png" width="110">
  <h1>HAVKAR</h1>
  <p>Connect • Trade • Work • Help</p>
</div>
<div class="grid">

  <div class="card">
    <div class="icon">💬</div>
    Chat
  </div>

  <div class="card">
    <div class="icon">💼</div>
    Jobs
  </div>

  <div class="card">
    <div class="icon">🛒</div>
    Buy & Sell
  </div>

  <div class="card">
    <div class="icon">🛠</div>
    Services
  </div>

  <div class="card">
    <div class="icon">💳</div>
    Wallet
  </div>

  <div class="card">
    <div class="icon">🎧</div>
    Support
  </div>

</div>

<div class="btn">Enter HAVKAR →</div>

</body>
</html>
