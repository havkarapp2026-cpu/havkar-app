<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f0e8 0%, #d8e8d8 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .phone-frame {
            width: 100%;
            max-width: 390px;
            background: linear-gradient(145deg, #f5f9f5, #e8f0e8);
            border-radius: 50px;
            padding: 60px 25px 30px;
            box-shadow: 0 35px 100px rgba(0,0,0,0.12);
            border: 8px solid #d8e8d8;
            position: relative;
        }

        .phone-frame::before {
            content: '';
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 5px;
            background: #b8c8b8;
            border-radius: 3px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #4caf50, #1976d2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 8px 20px rgba(25, 118, 210, 0.3);
        }

        h1 {
            font-size: 2.2rem;
            color: #1976d2;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            margin-bottom: 35px;
        }

        .menu-card {
            background: white;
            border-radius: 25px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            border: 1px solid rgba(200, 220, 200, 0.3);
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
        }

        .icon-jobs { color: #458b74; }
        .icon-buy { color: #8db82e; }
        .icon-services { color: #5e92f3; }
        .icon-chat { color: #26a69a; }
        .icon-wallet { color: #458b74; }
        .icon-support { color: #5e92f3; }

        .menu-card span {
            display: block;
            color: #5a7a7a;
            font-weight: 600;
            font-size: 1.05rem;
        }

        .buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 35px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-login {
            background: #1976d2;
            color: white;
            box-shadow: 0 8px 20px rgba(25, 118, 210, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(25, 118, 210, 0.4);
        }

        .btn-create {
            background: transparent;
            color: #1976d2;
            border: 2px solid #1976d2;
        }

        .btn-create:hover {
            background: rgba(25, 118, 210, 0.05);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="header">
            <div class="logo">🌍</div>
            <h1>HAVKAR</h1>
        </div>

        <div class="menu-grid">
            <div class="menu-card">
                <i class="fas fa-briefcase icon icon-jobs"></i>
                <span>Jobs</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-shopping-bag icon icon-buy"></i>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-tools icon icon-services"></i>
                <span>Services</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-comments icon icon-chat"></i>
                <span>Chat</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-wallet icon icon-wallet"></i>
                <span>Wallet</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-headset icon icon-support"></i>
                <span>Support</span>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-login">Log In</button>
            <button class="btn btn-create">Create Account</button>
        </div>
    </div>
</body>
</html>
