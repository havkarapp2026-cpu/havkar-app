<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(135deg, rgba(232, 245, 233, 0.95) 0%, rgba(200, 230, 201, 0.95) 100%);
            border-radius: 40px;
            padding: 50px 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .globe-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            position: relative;
        }

        h1 {
            font-size: 3.5rem;
            color: #1b5e20;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .tagline {
            color: #4a4a4a;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .menu-item {
            background: white;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .menu-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .menu-item span {
            display: block;
            color: #2e2e2e;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .enter-button {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .enter-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(46, 125, 50, 0.4);
        }

        .enter-button::after {
            content: '→';
            font-size: 1.5rem;
        }

        .create-account {
            text-align: center;
            color: #4a4a4a;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .create-account:hover {
            color: #2e7d32;
        }

        .security-badge {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .security-badge::before {
            content: '✓';
            color: #2e7d32;
            font-weight: bold;
        }

        .security-badge::after {
            content: '🔒';
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <div class="globe-container">
                <svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="earthGradient" cx="40%" cy="40%">
                            <stop offset="0%" stop-color="#66bb6a"/>
                            <stop offset="60%" stop-color="#43a047"/>
                            <stop offset="100%" stop-color="#2e7d32"/>
                        </radialGradient>
                        <filter id="shadow">
                            <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
                        </filter>
                    </defs>
                    
                    <ellipse cx="60" cy="60" rx="75" ry="22" fill="none" stroke="#2e7d32" stroke-width="5" opacity="0.5" filter="url(#shadow)"/>
                    
                    <circle cx="60" cy="60" r="45" fill="url(#earthGradient)" filter="url(#shadow)"/>
                    
                    <path d="M 35,30 Q 40,25 48,28 Q 52,30 50,35 Q 48,38 42,37 Q 36,36 35,30 Z" fill="#1b5e20" opacity="0.8"/>
                    <path d="M 70,35 Q 75,32 80,36 Q 83,40 81,46 Q 78,50 72,48 Q 68,45 70,35 Z" fill="#1b5e20" opacity="0.8"/>
                    <path d="M 38,68 Q 42,65 48,67 Q 52,70 50,75 Q 46,78 40,76 Q 36,73 38,68 Z" fill="#1b5e20" opacity="0.8"/>
                    <path d="M 72,70 Q 78,68 84,72 Q 86,77 82,82 Q 77,85 72,82 Q 69,78 72,70 Z" fill="#1b5e20" opacity="0.8"/>
                    <circle cx="56" cy="52" r="8" fill="#1b5e20" opacity="0.8"/>
                    
                    <ellipse cx="48" cy="42" rx="18" ry="15" fill="white" opacity="0.25"/>
                    
                    <path d="M 10,55 Q 20,48 35,45 Q 50,43 60,43" fill="none" stroke="#2e7d32" stroke-width="5" opacity="0.7"/>
                    <path d="M 60,77 Q 70,77 85,75 Q 100,72 110,65" fill="none" stroke="#2e7d32" stroke-width="5" opacity="0.7"/>
                </svg>
            </div>
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item">
                <div class="menu-icon">🛒</div>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💼</div>
                <span>Jobs</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">🔧</div>
                <span>Services</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💰</div>
                <span>Wallet</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💬</div>
                <span>Chat</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">🎧</div>
                <span>Support</span>
            </div>
        </div>

        <button class="enter-button">Enter HAVKAR</button>

        <div class="create-account">Create New Account</div>

        <div class="security-badge">Safe • Secure</div>
    </div>
</body>
</html>
