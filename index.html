<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HAVKAR</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(#eaf5ef, #dfeee7);
  text-align:center;
}

.top {
  padding:30px 20px 10px;
}

.top img {
  width:120px;
}

h1 {
  color:#1b5e20;
  font-size:32px;
  margin:10px 0;
}

.top p {
  color:#555;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:20px;
}

.card {
  background:#fff;
  padding:25px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.icon {
  font-size:40px;
  margin-bottom:10px;
}

.btn {
  margin:30px 20px;
  padding:18px;
  background:linear-gradient(90deg,#1b8f3a,#2ecc71);
  color:white;
  border-radius:50px;
  font-size:20px;
  font-weight:bold;
}

.sub {
  color:#777;
  margin-top:10px;
}

.sec {
  margin-top:10px;
  color:#2e7d32;
}
</style>

</head>

<body>

<div class="top">
  <img src="https://cdn-icons-png.flaticon.com/512/921/921347.png">
  <h1>HAVKAR</h1>
  <p>Connect • Trade • Work • Help</p>
</div>

<div class="grid">

  <div class="card">
    <div class="icon">💬</div>
    Chat
  </div>

  <div class="card">
    <div class="icon">💼</div>
    Jobs
  </div>

  <div class="card">
    <div class="icon">🛒</div>
    Buy & Sell
  </div>

  <div class="card">
    <div class="icon">🛠️</div>
    Services
  </div>

  <div class="card">
    <div class="icon">💳</div>
    Wallet
  </div>

  <div class="card">
    <div class="icon">🎧</div>
    Support
  </div>

</div>

<div class="btn">Enter HAVKAR →</div>

<div class="sub">Create New Account</div>
<div class="sec">🔒 امن • آسان</div>

</body>
</html>
