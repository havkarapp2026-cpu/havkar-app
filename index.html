<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #d8edd8 0%, #c5e1c5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(to bottom, rgba(248, 252, 248, 0.98), rgba(238, 246, 238, 0.98));
            border-radius: 45px;
            padding: 60px 35px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.12);
            border: 3px solid rgba(200, 230, 200, 0.6);
            position: relative;
            overflow: hidden;
        }

        .world-map-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(160, 200, 160, 0.35) 2px, transparent 2px);
            background-size: 35px 35px;
            background-position: 0 0;
            opacity: 0.7;
            pointer-events: none;
            z-index: 0;
        }

        .container > * {
            position: relative;
            z-index: 1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 45px;
        }

        .globe-image {
            width: 110px;
            height: 110px;
            margin: 0 auto 30px;
            display: block;
            filter: drop-shadow(0 10px 25px rgba(46, 125, 50, 0.35));
        }

        h1 {
            font-size: 3.8rem;
            color: #0d4d21;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .tagline {
            color: #5a5a5a;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 1.5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 45px;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 22px;
            padding: 28px 18px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.06);
        }

        .menu-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .menu-icon {
            font-size: 2.8rem;
            margin-bottom: 12px;
            display: block;
        }

        .menu-item span {
            display: block;
            color: #2a2a2a;
            font-weight: 600;
            font-size: 1rem;
        }

        .enter-button {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%);
            color: white;
            border: none;
            border-radius: 55px;
            padding: 22px;
            font-size: 1.35rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.35);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
            letter-spacing: 1px;
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(46, 125, 50, 0.45);
        }

        .enter-button::after {
            content: '→';
            font-size: 1.6rem;
        }

        .create-account {
            text-align: center;
            color: #5a5a5a;
            font-size: 1.05rem;
            font-weight: 500;
            margin-bottom: 22px;
            cursor: pointer;
        }

        .create-account:hover {
            color: #2e7d32;
        }

        .security-badge {
            text-align: center;
            color: #6a6a6a;
            font-size: 0.95rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .security-badge::before {
            content: '✓';
            color: #2e7d32;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .security-badge::after {
            content: '🔒';
            font-size: 1rem;
        }

        .decorative-plant {
            position: absolute;
            bottom: 75px;
            right: 12px;
            width: 90px;
            height: 140px;
            opacity: 0.75;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="world-map-bg"></div>
        
        <div class="logo-section">
            <img src="icon.png" alt="HAVKAR Globe" class="globe-image">
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item">
                <span class="menu-icon">💬</span>
                <span>Chat</span>
            </div>
            <div class="menu-item">
                <span class="menu-icon">💼</span>
                <span>Jobs</span>
            </div>
            <div class="menu-item">
                <span class="menu-icon">🛒</span>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-item">
                <span class="menu-icon">🔧</span>
                <span>Services</span>
            </div>
            <div class="menu-item">
                <span class="menu-icon">💰</span>
                <span>Wallet</span>
            </div>
            <div class="menu-item">
                <span class="menu-icon">🎧</span>
                <span>Support</span>
            </div>
        </div>

        <button class="enter-button">Enter HAVKAR</button>

        <div class="create-account">Create New Account</div>

        <div class="security-badge">Safe • Secure</div>
        
        <svg class="decorative-plant" viewBox="0 0 90 140" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2d7a33"/>
                    <stop offset="100%" stop-color="#1b5520"/>
                </linearGradient>
                <linearGradient id="leaf2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#43a047"/>
                    <stop offset="100%" stop-color="#2e7d32"/>
                </linearGradient>
                <linearGradient id="leaf3" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#388e3c"/>
                    <stop offset="100%" stop-color="#2d7a33"/>
                </linearGradient>
            </defs>
            
            <ellipse cx="45" cy="30" rx="24" ry="32" fill="url(#leaf1)" opacity="0.9" transform="rotate(-15 45 30)"/>
            <ellipse cx="48" cy="70" rx="27" ry="35" fill="url(#leaf2)" opacity="0.85" transform="rotate(10 48 70)"/>
            <ellipse cx="50" cy="110" rx="25" ry="33" fill="url(#leaf3)" opacity="0.9" transform="rotate(-10 50 110)"/>
            
            <path d="M 45,20 Q 45,50 47,90 Q 48,115 50,135" 
                  fill="none" stroke="#1b5520" stroke-width="2" opacity="0.4"/>
        </svg>
    </div>
</body>
    </html>
