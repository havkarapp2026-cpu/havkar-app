<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(135deg, rgba(240, 248, 240, 0.95) 0%, rgba(220, 237, 220, 0.95) 100%);
            border-radius: 40px;
            padding: 50px 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle, rgba(184, 212, 184, 0.4) 1.5px, transparent 1.5px),
                radial-gradient(circle, rgba(184, 212, 184, 0.3) 1px, transparent 1px);
            background-size: 50px 50px, 30px 30px;
            background-position: 0 0, 25px 25px;
            opacity: 0.6;
            pointer-events: none;
            z-index: 0;
        }

        .container > * {
            position: relative;
            z-index: 1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .globe-image {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            display: block;
            filter: drop-shadow(0 8px 20px rgba(46, 125, 50, 0.3));
        }

        h1 {
            font-size: 3.5rem;
            color: #1b5e20;
            font-weight: 800;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .tagline {
            color: #4a4a4a;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        .menu-item {
            background: white;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .menu-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .menu-item span {
            display: block;
            color: #2e2e2e;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .enter-button {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #388e3c 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .enter-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(46, 125, 50, 0.4);
        }

        .enter-button::after {
            content: '→';
            font-size: 1.5rem;
        }

        .create-account {
            text-align: center;
            color: #4a4a4a;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .create-account:hover {
            color: #2e7d32;
        }

        .security-badge {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .security-badge::before {
            content: '✓';
            color: #2e7d32;
            font-weight: bold;
        }

        .security-badge::after {
            content: '🔒';
        }

        .decorative-leaf {
            position: absolute;
            bottom: 60px;
            right: -20px;
            width: 180px;
            height: 220px;
            opacity: 0.75;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="icon.png" alt="HAVKAR Globe" class="globe-image">
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item">
                <div class="menu-icon">🛒</div>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💼</div>
                <span>Jobs</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">🔧</div>
                <span>Services</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💰</div>
                <span>Wallet</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">💬</div>
                <span>Chat</span>
            </div>
            <div class="menu-item">
                <div class="menu-icon">🎧</div>
                <span>Support</span>
            </div>
        </div>

        <button class="enter-button">Enter HAVKAR</button>

        <div class="create-account">Create New Account</div>

        <div class="security-badge">Safe • Secure</div>
        
        <svg class="decorative-leaf" viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4caf50"/>
                    <stop offset="50%" stop-color="#388e3c"/>
                    <stop offset="100%" stop-color="#2e7d32"/>
                </linearGradient>
            </defs>
            <ellipse cx="60" cy="75" rx="50" ry="65" fill="url(#leafGrad)" opacity="0.9" transform="rotate(20 60 75)"/>
            <path d="M 60,20 Q 60,50 58,90 Q 57,115 60,135" 
                  fill="none" stroke="#1b5e20" stroke-width="3" opacity="0.6"/>
        </svg>
    </div>
</body>
                          </html>
