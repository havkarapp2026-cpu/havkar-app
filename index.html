<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HAVKAR</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#eaf5ef;
  text-align:center;
}

.top {
  padding-top:20px;
}

.top img {
  width:90px;
}

h1 {
  color:#1b5e20;
  margin:10px 0 5px;
}

.top p {
  color:#555;
  font-size:14px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:15px;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.icon {
  font-size:30px;
  margin-bottom:8px;
}

.btn {
  margin:20px;
  padding:15px;
  background:linear-gradient(90deg,#1b8f3a,#2ecc71);
  color:white;
  border-radius:40px;
  font-size:18px;
  font-weight:bold;
}

.sub {
  color:#777;
  font-size:13px;
}

.sec {
  color:#2e7d32;
  font-size:13px;
  margin-top:5px;
}
</style>

</head>

<body>

<div class="top">
  <img src="https://cdn-icons-png.flaticon.com/512/921/921347.png">
  <h1>HAVKAR</h1>
  <p>Connect • Trade • Work • Help</p>
</div>

<div class="grid">

  <div class="card">
    <div class="icon">💬</div>
    Chat
  </div>

  <div class="card">
    <div class="icon">💼</div>
    Jobs
  </div>

  <div class="card">
    <div class="icon">🛒</div>
    Buy & Sell
  </div>

  <div class="card">
    <div class="icon">🛠️</div>
    Services
  </div>

  <div class="card">
    <div class="icon">💳</div>
    Wallet
  </div>

  <div class="card">
    <div class="icon">🎧</div>
    Support
  </div>

</div>

<div class="btn">Enter HAVKAR →</div>

<div class="sub">Create New Account</div>
<div class="sec">🔒 امن • آسان</div>

</body>
</html>
