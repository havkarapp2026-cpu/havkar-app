<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR - Global Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 45px;
            padding: 35px 25px 30px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 25px 70px rgba(0,0,0,0.12);
            border: 3px solid rgba(200, 230, 200, 0.6);
            position: relative;
            overflow-y: auto;
            max-height: 95vh;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(140, 180, 140, 0.3) 2px, transparent 2px);
            background-size: 40px 40px;
            opacity: 0.7;
            pointer-events: none;
        }

        .container > * {
            position: relative;
            z-index: 1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 25px;
        }

        .globe-image {
            width: 75px;
            height: 75px;
            margin: 0 auto 18px;
            display: block;
            filter: drop-shadow(0 8px 20px rgba(46, 125, 50, 0.3));
        }

        h1 {
            font-size: 2.5rem;
            color: #1b5e20;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .tagline {
            color: #5a5a5a;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1.3px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .menu-item {
            background: white;
            border-radius: 16px;
            padding: 18px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
        }

        .menu-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }

        .menu-icon {
            font-size: 1.8rem;
            margin-bottom: 6px;
        }

        .icon-buy { color: #66bb6a; }
        .icon-jobs { color: #42a5f5; }
        .icon-services { color: #ffa726; }
        .icon-wallet { color: #26a69a; }
        .icon-tickets { color: #5c6bc0; }
        .icon-ads { color: #ec407a; }
        .icon-chat { color: #26c6da; }
        .icon-language { color: #78909c; }
        .icon-delivery { color: #ff7043; }
        .icon-reviews { color: #ffca28; }
        .icon-events { color: #ef5350; }
        .icon-support { color: #ab47bc; }

        .menu-item span {
            display: block;
            color: #2a2a2a;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .enter-button {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.35);
            margin-bottom: 18px;
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(46, 125, 50, 0.45);
        }

        .enter-button::after {
            content: ' →';
            font-size: 1.3rem;
        }

        .create-account {
            text-align: center;
            color: #5a5a5a;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .create-account:hover {
            color: #2e7d32;
        }

        .security-badge {
            text-align: center;
            color: #6a6a6a;
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }

        .security-badge::before {
            content: '✓';
            color: #2e7d32;
            font-weight: bold;
        }

        .security-badge::after {
            content: '🔒';
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="icon.png" alt="HAVKAR Globe" class="globe-image">
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="window.location.href='buy-sell.html'">
                <i class="fas fa-shopping-bag menu-icon icon-buy"></i>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-item" onclick="window.location.href='jobs.html'">
                <i class="fas fa-briefcase menu-icon icon-jobs"></i>
                <span>Jobs</span>
            </div>
            <div class="menu-item" onclick="window.location.href='services.html'">
                <i class="fas fa-tools menu-icon icon-services"></i>
                <span>Services</span>
            </div>
            <div class="menu-item" onclick="window.location.href='wallet.html'">
                <i class="fas fa-wallet menu-icon icon-wallet"></i>
                <span>Wallet</span>
            </div>
            <div class="menu-item" onclick="window.location.href='tickets.html'">
                <i class="fas fa-ticket-alt menu-icon icon-tickets"></i>
                <span>Tickets</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-bullhorn menu-icon icon-ads"></i>
                <span>Ads</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-comments menu-icon icon-chat"></i>
                <span>Chat</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-language menu-icon icon-language"></i>
                <span>Language</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-shipping-fast menu-icon icon-delivery"></i>
                <span>Delivery</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-star menu-icon icon-reviews"></i>
                <span>Reviews</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-calendar-alt menu-icon icon-events"></i>
                <span>Events</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-headset menu-icon icon-support"></i>
                <span>Support</span>
            </div>
        </div>

        <button class="enter-button" onclick="window.location.href='login.html'">Enter HAVKAR</button>
        <div class="create-account" onclick="window.location.href='login.html'">Create New Account</div>
        <div class="security-badge">Safe • Secure</div>
    </div>
</body>
                </html>
