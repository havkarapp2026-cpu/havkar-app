<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 45px;
            padding: 50px 30px 35px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 25px 70px rgba(0,0,0,0.12);
            border: 3px solid rgba(200, 230, 200, 0.6);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(140, 180, 140, 0.3) 2px, transparent 2px);
            background-size: 40px 40px;
            opacity: 0.7;
            pointer-events: none;
        }

        .container > * {
            position: relative;
            z-index: 1;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .globe-image {
            width: 110px;
            height: 110px;
            margin: 0 auto 25px;
            display: block;
            filter: drop-shadow(0 10px 25px rgba(46, 125, 50, 0.35));
            background: white;
            border-radius: 25px;
            padding: 5px;
        }

        h1 {
            font-size: 3.5rem;
            color: #1b5e20;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .tagline {
            color: #5a5a5a;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1.5px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .menu-item {
            background: white;
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.06);
        }

        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
        }

        .menu-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .icon-buy { color: #388e3c; }
        .icon-jobs { color: #1976d2; }
        .icon-services { color: #f57c00; }
        .icon-wallet { color: #43a047; }
        .icon-chat { color: #00897b; }
        .icon-support { color: #5e35b1; }

        .menu-item span {
            display: block;
            color: #2a2a2a;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .enter-button {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%);
            color: white;
            border: none;
            border-radius: 55px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.35);
            margin-bottom: 25px;
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(46, 125, 50, 0.45);
        }

        .enter-button::after {
            content: ' →';
            font-size: 1.5rem;
        }

        .create-account {
            text-align: center;
            color: #5a5a5a;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .create-account:hover {
            color: #2e7d32;
        }

        .security-badge {
            text-align: center;
            color: #6a6a6a;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .security-badge::before {
            content: '✓';
            color: #2e7d32;
            font-weight: bold;
        }

        .security-badge::after {
            content: '🔒';
        }

        .decorative-plant {
            position: absolute;
            bottom: 80px;
            right: 15px;
            width: 70px;
            height: 105px;
            opacity: 0.75;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <img src="icon.png" alt="HAVKAR Globe" class="globe-image">
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item">
                <i class="fas fa-shopping-bag icon-buy"></i>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-briefcase icon-jobs"></i>
                <span>Jobs</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-tools icon-services"></i>
                <span>Services</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-wallet icon-wallet"></i>
                <span>Wallet</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-comments icon-chat"></i>
                <span>Chat</span>
            </div>
            <div class="menu-item">
                <i class="fas fa-headset icon-support"></i>
                <span>Support</span>
            </div>
        </div>

        <button class="enter-button">Enter HAVKAR</button>
        <div class="create-account">Create New Account</div>
        <div class="security-badge">Safe • Secure</div>
        
        <svg class="decorative-plant" viewBox="0 0 70 105" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="leaf1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#2d7a33"/>
                    <stop offset="100%" stop-color="#1b5520"/>
                </linearGradient>
                <linearGradient id="leaf2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#43a047"/>
                    <stop offset="100%" stop-color="#2e7d32"/>
                </linearGradient>
            </defs>
            <ellipse cx="35" cy="25" rx="20" ry="25" fill="url(#leaf1)" opacity="0.9" transform="rotate(-15 35 25)"/>
            <ellipse cx="38" cy="55" rx="22" ry="27" fill="url(#leaf2)" opacity="0.85" transform="rotate(10 38 55)"/>
            <ellipse cx="40" cy="85" rx="20" ry="25" fill="url(#leaf1)" opacity="0.9" transform="rotate(-10 40 85)"/>
        </svg>
    </div>
</body>
                </html>
