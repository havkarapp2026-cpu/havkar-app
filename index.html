<!DOCTYPE html>
<html>
<head>
  <title>HAVKAR</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #eaf5ef;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
      color: #1b5e20;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
      font-weight: bold;
    }

    .btn {
      margin: 20px;
      padding: 15px;
      background: green;
      color: white;
      border-radius: 30px;
      display: inline-block;
      width: 80%;
    }
  </style>
</head>
<body>

<h1>HAVKAR</h1>

<div class="grid">
  <div class="card">Chat</div>
  <div class="card">Jobs</div>
  <div class="card">Buy & Sell</div>
  <div class="card">Services</div>
  <div class="card">Wallet</div>
  <div class="card">Support</div>
</div>

<div class="btn">Enter HAVKAR →</div>

</body>
</html>
