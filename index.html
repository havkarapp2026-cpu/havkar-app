<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAVKAR - Global Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 50%, #a5d6a7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle, rgba(129, 199, 132, 0.15) 2px, transparent 2px);
            background-size: 50px 50px;
            opacity: 0.4;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 45px;
            padding: 50px 30px 35px;
            max-width: 420px;
            width: 100%;
            box-shadow: 
                0 30px 80px rgba(0,0,0,0.1),
                0 0 0 1px rgba(129, 199, 132, 0.2) inset;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .globe-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 25px;
            position: relative;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><defs><linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%232e7d32;stop-opacity:1" /><stop offset="50%" style="stop-color:%2343a047;stop-opacity:1" /><stop offset="100%" style="stop-color:%234caf50;stop-opacity:1" /></linearGradient><radialGradient id="light" cx="30%" cy="30%"><stop offset="0%" style="stop-color:%23ffffff;stop-opacity:0.8" /><stop offset="100%" style="stop-color:%23ffffff;stop-opacity:0" /></radialGradient></defs><circle cx="100" cy="100" r="85" fill="url(%23globeGrad)"/><ellipse cx="100" cy="100" rx="85" ry="85" fill="url(%23light)"/><path d="M 100,15 Q 100,50 100,100 Q 100,150 100,185" stroke="%231b5e20" stroke-width="3" fill="none" opacity="0.3"/><path d="M 15,100 Q 50,100 100,100 Q 150,100 185,100" stroke="%231b5e20" stroke-width="3" fill="none" opacity="0.3"/><path d="M 100,15 Q 130,50 150,100 Q 130,150 100,185" stroke="%231b5e20" stroke-width="2.5" fill="none" opacity="0.3"/><path d="M 100,15 Q 70,50 50,100 Q 70,150 100,185" stroke="%231b5e20" stroke-width="2.5" fill="none" opacity="0.3"/><ellipse cx="100" cy="100" rx="25" ry="85" stroke="%231b5e20" stroke-width="2" fill="none" opacity="0.2"/><ellipse cx="100" cy="100" rx="55" ry="85" stroke="%231b5e20" stroke-width="2" fill="none" opacity="0.2"/><path d="M 40,50 L 50,45 L 45,60 L 55,55 L 50,70 Z" fill="%231b5e20" opacity="0.4"/><path d="M 120,40 L 135,38 L 130,52 L 140,48 Z" fill="%231b5e20" opacity="0.4"/><path d="M 70,130 L 75,125 L 80,135 L 88,128 L 85,145 Z" fill="%231b5e20" opacity="0.4"/><path d="M 140,120 L 150,118 L 148,130 L 155,128 Z" fill="%231b5e20" opacity="0.4"/><ellipse cx="100" cy="100" rx="88" ry="88" stroke="%23ffffff" stroke-width="4" fill="none" opacity="0.3" transform="rotate(45 100 100)"/></svg>') center/contain no-repeat;
            filter: drop-shadow(0 15px 30px rgba(46, 125, 50, 0.3));
            animation: rotateGlobe 20s linear infinite;
        }

        @keyframes rotateGlobe {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-size: 3.2rem;
            color: #1b5e20;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 12px;
        }

        .tagline {
            color: #5a6a5a;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .menu-card {
            background: linear-gradient(145deg, #ffffff, #f5f5f5);
            border-radius: 22px;
            padding: 28px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 1px solid rgba(129, 199, 132, 0.1);
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        .menu-card i {
            font-size: 2.4rem;
            margin-bottom: 10px;
            display: block;
        }

        .icon-buy { color: #388e3c; }
        .icon-jobs { color: #1976d2; }
        .icon-services { color: #f57c00; }
        .icon-wallet { color: #43a047; }
        .icon-chat { color: #00897b; }
        .icon-support { color: #5e35b1; }

        .menu-card span {
            display: block;
            color: #2a2a2a;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .enter-button {
            width: 100%;
            background: linear-gradient(135deg, #2e7d32 0%, #43a047 100%);
            color: white;
            border: none;
            border-radius: 55px;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(46, 125, 50, 0.35);
            margin-bottom: 25px;
        }

        .enter-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(46, 125, 50, 0.45);
        }

        .enter-button::after {
            content: ' →';
        }

        .create-account {
            text-align: center;
            color: #5a5a5a;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .create-account:hover {
            color: #2e7d32;
        }

        .security-badge {
            text-align: center;
            color: #6a6a6a;
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .security-badge::before {
            content: '✓';
            color: #2e7d32;
            font-weight: bold;
        }

        .security-badge::after {
            content: '🔒';
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="globe-container"></div>
            <h1>HAVKAR</h1>
            <div class="tagline">Connect • Trade • Work • Help</div>
        </div>

        <div class="menu-grid">
            <div class="menu-card">
                <i class="fas fa-shopping-bag icon-buy"></i>
                <span>Buy & Sell</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-briefcase icon-jobs"></i>
                <span>Jobs</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-tools icon-services"></i>
                <span>Services</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-wallet icon-wallet"></i>
                <span>Wallet</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-comments icon-chat"></i>
                <span>Chat</span>
            </div>
            <div class="menu-card">
                <i class="fas fa-headset icon-support"></i>
                <span>Support</span>
            </div>
        </div>

        <button class="enter-button">Enter HAVKAR</button>
        <div class="create-account">Create New Account</div>
        <div class="security-badge">Safe • Secure</div>
    </div>
</body>
</html>
